<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h2>📊 Student List</h2>
<form method="POST">
    <input type="text" name="search" placeholder="Search by Roll Number">
    <button type="submit">Search</button>
</form>
<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Roll</th>
        <th>Total</th>
        <th>Percentage</th>
        <th>Grade</th>
        <th>Action</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[6] }}</td>
        <td>{{ "%.2f"|format(student[7]) }}%</td>
        <td>{{ student[8] }}</td>
        <td>
            <a href="/edit/{{ student[0] }}">Edit</a> |
            <a href="/delete/{{ student[0] }}" onclick="return confirm('Delete?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/">⬅ Back</a>

</body>
</html>
