<!DOCTYPE html>
<html>
<head>
<title>Students</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

.sidebar {
    width: 220px;
    height: 100vh;
    background: #2c3e50;
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
    margin-top: 10px;
}

.main {
    margin-left: 240px;
    padding: 20px;
}

table {
    width: 100%;
    background: white;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

button {
    padding: 5px 10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>📘 School App</h2>
    <a href="/">➕ Add Result</a>
    <a href="/students">📊 Students</a>
    <a href="/logout">🔐 Logout</a>
</div>

<div class="main">

<h2>📊 Student List</h2>

<form method="POST">
<input name="search" placeholder="Search Roll">
<button>Search</button>
</form>

<br>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Roll</th>
<th>Total</th>
<th>%</th>
<th>Grade</th>
<th>Action</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s[0] }}</td>
<td>{{ s[1] }}</td>
<td>{{ s[2] }}</td>
<td>{{ s[12] }}</td>
<td>{{ "%.2f"|format(s[13]) }}%</td>
<td>{{ s[14] }}</td>
<td>
<a href="/edit/{{ s[0] }}">Edit</a> |
<a href="/delete/{{ s[0] }}">Delete</a> |
<a href="/download/{{ s[0] }}">PDF</a>
</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
