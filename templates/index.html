<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Result</title>

  <!-- ✅ MOST IMPORTANT (fixes mobile view) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #3f51b5, #2196f3);
      color: #333;
    }

    .container {
      max-width: 500px;
      margin: 30px auto;
      background: #fff;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #3f51b5;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #3f51b5;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #303f9f;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f5f5f5;
    }

    .error {
      color: red;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Student Result</h1>

    <input type="text" id="roll" placeholder="Enter Roll Number">

    <button onclick="getResult()">Get Result</button>

    <div id="output"></div>
  </div>

  <script>
    function getResult() {
      const roll = document.getElementById("roll").value.trim();
      const output = document.getElementById("output");

      if (roll === "") {
        output.innerHTML = "<p class='error'>Please enter roll number</p>";
        return;
      }

      // Dummy data (replace with your backend later)
      if (roll === "101") {
        output.innerHTML = `
          <div class="result">
            <h3>Name: Rahul Kumar</h3>
            <p>Roll: 101</p>
            <p>Math: 90</p>
            <p>Science: 85</p>
            <p>English: 88</p>
          </div>
        `;
      } else {
        output.innerHTML = "<p class='error'>No Result Found</p>";
      }
    }
  </script>

</body>
</html>
